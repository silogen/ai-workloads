apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "release.fullname" . }}
data:
{{- $files := .Files }}
{{- range $path, $_ := .Files.Glob "mount/*" }}
  {{- $key := $path | trimPrefix "mount/" }}
  {{- $isTpl := hasSuffix ".tpl" $key}}
  {{- $content := "" }}
  {{- if $isTpl }}
    {{- $key = trimSuffix ".tpl" $key }}
    {{- $content = tpl ($files.Get $path) $ }}
  {{- else }}
    {{- $content = $files.Get $path }}
  {{- end }}
  {{ $key }}: |
{{ $content | indent 4 }}
{{- end }}
