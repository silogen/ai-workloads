{{- define "job" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "release.fullname" . }}
  {{- if .Values.metadata.labels }}
  labels:
    {{- range $key, $value := .Values.metadata.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        {{- include "container.volumes" . | nindent 8 }}
      containers:
        - name: training
          image: "{{ .Values.image }}"
          imagePullPolicy: Always
          command: ["sh", "-euc"]
          args:
            - |
              # Print GPU Info:
              rocm-smi;
              bash /workload/mount/entrypoint.sh
          resources:
            {{- with .Values.resources }}
            limits:
              memory: "{{ .memory }}"
              cpu: "{{ .cpu }}"
              amd.com/gpu: "{{ .gpu }}"
            requests:
              memory: "{{ .memory }}"
              cpu: "{{ .cpu }}"
              amd.com/gpu: "{{ .gpu }}"
            {{- end }}
          env:
            {{- include "container.env" . | nindent 12 }}
            - name: HIP_VISIBLE_DEVICES
              value: "{{ int .Values.resources.gpu | until | join "," }}"
          volumeMounts:
            {{- include "container.volumeMounts" . | nindent 12 }}
{{- end -}}

{{- define "job_wrapped_with_kaiwojob" -}}
apiVersion: kaiwo.silogen.ai/v1alpha1
kind: KaiwoJob
metadata:
  name: {{ include "release.fullname" . }}
spec:
  job:
    {{- include "job" . | nindent 4 }}
{{- end -}}

{{- if .Values.kaiwo.enabled -}}
{{- include "job_wrapped_with_kaiwojob" . }}
{{- else -}}
{{- include "job" . }}
{{- end -}}
