trainingMode: sft

### Model ###
modelName: "meta-llama/Llama-3.1-70B"
gpus: 8
memoryPerGpu: 64
cpusPerGpu: 8

checkpointsReservedSize: 550Gi
storageClass: mlstorage

hfTokenSecret:
  name: hf-token
  key: hf-token

tokenizerOverrides:
  eos_token: "<|eot_id|>"
  pad_token: "<|finetune_right_pad_id|>"

checkpointsRemote: "default-bucket/experiments/llama31-70b-mi300-full"
datasetRemote: "default-bucket/verl-sft/dolci-instruct-sft"

mlflowTrackingUri: ""

verlConfig:

  # =======================
  # DATA
  # =======================
  data:
    train_max_samples: 20480
    val_max_samples: 2048

    multiturn:
      enable: true
      messages_key: messages

    max_length: 2048
    truncation: right

    apply_chat_template_kwargs:
      chat_template: |
        {{ bos_token }}
        {% if messages[0]['role'] == 'system' %}
        <|start_header_id|>system<|end_header_id|>

        {{ messages[0]['content'] | trim }}<|eot_id|>
        {% set messages = messages[1:] %}
        {% endif %}
        {% for m in messages %}
        <|start_header_id|>{{ m['role'] }}<|end_header_id|>

        {{ m['content'] | trim }}<|eot_id|>
        {% endfor %}
        {% if add_generation_prompt %}
        <|start_header_id|>assistant<|end_header_id|>

        {% endif %}
    micro_batch_size_per_gpu: 2
    train_batch_size: 16

  # =======================
  # MODEL
  # =======================
  model:
    partial_pretrain: "meta-llama/Llama-3.1-70B"
    tokenizer_path: /workdir/tokenizer
    trust_remote_code: false

    strategy: fsdp2
    fsdp_config:
      model_dtype: bfloat16
      forward_prefetch: true
      reshard_after_forward: true

    enable_gradient_checkpointing: false
    use_remove_padding: false
    use_liger: true

    lora_rank: 0

  # =======================
  # OPTIM
  # =======================
  optim:
    lr: 1.5e-5
    betas: [ 0.9, 0.95 ]
    weight_decay: 0.1
    lr_warmup_steps_ratio: 0.03
    lr_scheduler: cosine
    clip_grad: 1.0

  # =======================
  # TRAINER
  # =======================
  trainer:
    project_name: llama31-70b-full
    experiment_name: dolci-instruct-sft-01
    total_epochs: 1
    test_freq: 100
    logger: [ "console"]
