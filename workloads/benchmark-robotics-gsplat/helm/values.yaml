metadata:
  labels: {}

# The build steps for this file can be found under ai-workloads/docker/robotics/gsplat/Dockerfile
image: ghcr.io/silogen/gsplat:rocm6.4.3_ubuntu24.04_py3.12_pytorch_release_2.6.0
imagePullPolicy: Always

gpus: 1
memoryPerGpu: 128
cpuPerGpu: 12

entrypoint: |
  # Copy the code directory to the ephemeral storage
  cp -r /code /workload/code
  cd /workload/code

  echo "Downloading the dataset, single-GPU gsplat benchmarking, and converting the output to the markdown tables"
  chmod +x ./entrypoint.sh
  bash ./entrypoint.sh

imagePullSecrets: []

storage:
  ephemeral:
    quantity: 128Gi
    # Change the storageClassName to standard or other name
    storageClassName: mlstorage
    accessModes:
      - ReadWriteOnce
  dshm:
    sizeLimit: 128Gi
