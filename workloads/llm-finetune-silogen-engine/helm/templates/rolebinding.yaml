{{- if and .Values.aimManifest.enabled (not .Values.aimManifest.serviceAccountName) .Values.aimManifest.autoApply }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ .Release.Name }}-rolebinding"
  {{- if .Values.labels }}
  labels:
    {{- range $label, $value := .Values.labels }}
    {{ $label }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "{{ .Release.Name }}-role"
subjects:
- kind: ServiceAccount
  name: "{{ .Release.Name }}-sa"
{{- end }}
